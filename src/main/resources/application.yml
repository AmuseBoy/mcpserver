server:
  port: 8080

spring:
  application:
    name: mcpserver
  main:
    web-application-type: servlet
  ai:
    mcp:
      server:
        enabled: true
        name: weather-tool
        description: 天气查询 MCP 服务
        version: 1.0.0
        protocol: STREAMABLE
        type: SYNC
        # 工具/资源/Prompt 均为静态，无需运行时变更通知
        tool-change-notification: false
        resource-change-notification: false
        prompt-change-notification: false
